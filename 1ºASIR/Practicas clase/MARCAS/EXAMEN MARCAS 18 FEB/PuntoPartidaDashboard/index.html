<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard">
  <header>
    <h1>ASIR-Cloud Monitor</h1>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Servidores</a>
      <a href="#">Logs</a>
      <a href="#" data-type="admin">Admin</a>
    </nav>
  </header>
  
  <aside>
    <ul>
      <li>Nodo Principal</li>
      <li>Nodo Backup</li>
      <li>Almacenamiento S3</li>
      <li>Base de Datos</li>
    </ul>
  </aside>

  <main>
    <section class="stats">
      <article>CPU: 20%</article>
      <article>RAM: 45%</article>
      <article>Disco: 80%</article>
    </section>
    
    <section class="server-list">
      <div class="server" data-status="online">Web-Server-01</div>
      <div class="server" data-status="offline">DB-Master-01</div>
      <div class="server" data-status="online">Proxy-Cache</div>
      <div class="server" data-status="online">Mail-Server</div>
    </section>
  </main>

  <footer>
    <p>Estado del sistema: Operativo</p>
    <p>v2.4.0</p>
  </footer>
</div>
</body>
</html>
