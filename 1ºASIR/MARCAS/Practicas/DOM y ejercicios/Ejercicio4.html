<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4</title>
    <link rel="stylesheet" href="Ejercicio4.css">
</head>

<body>
    <section class="ejercicio-contenedor">
        <div class="marco">
            <div class="titulo">OPERADORES</div>
            <div class="acciones">
                <div class="input">
                    <label for="n1">Número 1:</label>
                    <input type="number" id="n1" value="5">
                </div>
                <div class="input">
                    <label for="n2">Número 2:</label>
                    <input type="number" id="n2" value="6">
                </div>
                <div class="botones">
                    <button onclick="calcular('+')">Sumar</button>
                    <button onclick="calcular('-')">Restar</button>
                    <button onclick="calcular('*')">Producto</button>
                    <button onclick="calcular('/')">División</button>
                    <button onclick="limpiar()">Limpiar</button>
                </div>
            </div>
            <div class="barra-resultado">
                <div class="label-resultado">Resultado:</div>
                <div id="resultado-display" class="valor-resultado">11</div>
            </div>
        </div>
    </section>
    
    <script src="Ejercicio4.js"></script>
</body>
</html>
