<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Reseña</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor_formulario">
        <header class="titulo">
            <h1>¡Únete a nuestra comunidad!</h1>
        </header>

        <form class="formulario">
            <h2>Formulario de Reseña de producto</h2>
            <p class="subtitulo">Eutod et auitilacto ex de comunida de pistro de lesidos.</p>

            <div class="rellenar">
                <label for="producto">Nombre del Producto</label>
                <input type="text" id="producto" placeholder="Nombre del Producto" required>
            </div>

            <div class="rellenar">
                <label for="valoracion">Valoración</label>
                <select id="valoracion" required>
                    <option value="" disabled selected hidden>Selecciona una opción</option>
                    <option value="1">⭐</option>
                    <option value="2">⭐⭐</option>
                    <option value="3">⭐⭐⭐</option>
                    <option value="4">⭐⭐⭐⭐</option>
                    <option value="5">⭐⭐⭐⭐⭐</option>
                </select>
            </div>

            <div class="rellenar">
                <label for="comentario">Comentario</label>
                <textarea id="comentario" rows="4" required></textarea>
            </div>

            <div class="recomendacion">
                <label>Recomendación</label>
                <div class="opciones_recomendacion">
                    <label><input type="radio" name="recomienda" value="si"> Sí</label>
                    <label><input type="radio" name="recomienda" value="no"> No</label>
                </div>
            </div>

            <div class="apartado_email">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="nombre@email.com" required>
            </div>

            <div class="botones">
                <button type="submit" class="btn-env">Enviar Reseña</button>
                <button type="button" class="btn-can">Cancelar</button>
            </div>
        </form>
    </div>

</body>
</html>
